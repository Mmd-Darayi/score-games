<!DOCTYPE html>
<html>
<head>
    <title>sing up Admin | ورود ادمین ها</title>

    <!-- css -->
    <link rel="stylesheet" href="assets/css/Settings.css">

    <!-- bootstrap -->
    <link rel="stylesheet" href="assets/css/bootstrap.css">

    <!-- icon -->
    <script src="https://kit.fontawesome.com/5345360a5d.js" crossorigin="anonymous"></script>

    <!-- icon Sait -->
    <link rel="shortcut icon" href="assets/imgs/" type="image/x-icon">
</head>
<body class="bg-dark">
    <!DOCTYPE html>
    <html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>به زودی | در حال ساخت</title>
        <style>
            /* استایل‌های کلی برای زیبایی صفحه */
            body, html {
                height: 100%;
                margin: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                color: white;
                overflow: hidden;
            }
    
            .container {
                text-align: center;
                padding: 20px;
            }
    
            /* انیمیشن برای متن اصلی */
            h1 {
                font-size: 4rem;
                margin-bottom: 10px;
                animation: fadeInDown 1.5s ease-out;
            }
    
            p {
                font-size: 1.5rem;
                opacity: 0.8;
                animation: fadeInUp 2s ease-out;
            }
    
            /* یک المان گرافیکی ساده (دایره در حال چرخش) */
            .loader {
                border: 5px solid rgba(255, 255, 255, 0.1);
                border-top: 5px solid #ffffff;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 20px auto;
            }
    
            /* تعریف انیمیشن‌ها */
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
    
            @keyframes fadeInDown {
                from { opacity: 0; transform: translateY(-30px); }
                to { opacity: 1; transform: translateY(0); }
            }
    
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
    
            /* واکنش‌گرا برای موبایل */
            @media (max-width: 600px) {
                h1 { font-size: 2.5rem; }
                p { font-size: 1.2rem; }
            }
        </style>
    </head>
    <body>
    
        <div class="container">
            <div class="loader"></div>
            <h1>به زودی...</h1>
            <p>ما در حال کار روی چیزی فوق‌العاده هستیم!</p>
            <p style="font-size: 1rem; margin-top: 20px;">در حال ساخت پروژه جدید...</p>
        </div>
    
    </body>
    </html>
    
</body>
</html>
